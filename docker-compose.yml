version: '3.8'

services:
  # 1. MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: local-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: local_db
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  # 2. Redis 缓存
  redis:
    image: redis:7.0-alpine
    container_name: local-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # 3. Kafka (使用 KRaft 模式，不需要额外安装 Zookeeper，更轻量高效)
  # PLAINTEXT://localhost:9092      — for host-machine clients (host port mapping)
  # PLAINTEXT_INTERNAL://local-kafka:29092 — for Docker-to-Docker clients (e.g. CMS)
  kafka:
    image: apache/kafka:latest
    container_name: local-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://local-kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: always

  # 4. PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: local-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: local_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 5. LiteLLM proxy
  litellm:
    image: litellm/litellm:latest
    container_name: local-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/local_db
      LITELLM_MASTER_KEY: sk-local-master-key
      UI_USERNAME: admin
      UI_PASSWORD: admin
      OPENAI_API_KEY: sk-dummy-openai-key
      ANTHROPIC_API_KEY: sk-dummy-anthropic-key
      GEMINI_API_KEY: dummy-gemini-key
      DEEPSEEK_API_KEY: sk-dummy-deepseek-key
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  mysql_data:
  redis_data:
  postgres_data: